<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatt App</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #app { background: white; width: 400px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    #header { background: #075e54; color: white; padding: 16px; font-size: 18px; font-weight: bold; }
    #messages { height: 400px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .message { background: #dcf8c6; padding: 8px 12px; border-radius: 8px; max-width: 80%; align-self: flex-end; }
    .message.other { background: #fff; border: 1px solid #eee; align-self: flex-start; }
    .message .sender { font-size: 11px; color: #888; margin-bottom: 4px; }
    #footer { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #eee; }
    #input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
    #send { background: #075e54; color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; }
    #login { padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    #login h3 { color: #075e54; }
    #login input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
    #login button { background: #075e54; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 16px; }
    #login .switch { text-align: center; font-size: 13px; color: #888; cursor: pointer; }
    #login .switch span { color: #075e54; font-weight: bold; }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">💬 Chatt App</div>

    <!-- Login Screen -->
    <div id="login">
      <h3 id="form-title">Sign In</h3>
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <button onclick="submitAuth()">Continue</button>
      <div class="switch" onclick="toggleMode()">Don't have an account? <span>Sign Up</span></div>
    </div>

    <!-- Chat Screen -->
    <div id="chat" style="display:none;">
      <div id="messages"></div>
      <div id="footer">
        <input type="text" id="input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()" />
        <button id="send" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const AUTH_URL = 'https://auth-production-f2eb.up.railway.app';
    const MESSAGES_URL = 'https://messages-production-b99d.up.railway.app';
    const CHAT_URL = 'https://chat-production-63aa.up.railway.app';

    const socket = io(CHAT_URL);
    let currentUser = '';
    let isSignUp = false;

    function toggleMode() {
      isSignUp = !isSignUp;
      document.getElementById('form-title').textContent = isSignUp ? 'Sign Up' : 'Sign In';
      document.querySelector('.switch').innerHTML = isSignUp
        ? 'Already have an account? <span>Sign In</span>'
        : 'Don\'t have an account? <span>Sign Up</span>';
    }

    async function submitAuth() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) return alert('Please fill in all fields');

      const endpoint = isSignUp ? '/auth/signup' : '/auth/signin';
      try {
        const res = await fetch(AUTH_URL + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) return alert(data.message || 'Auth failed');
        currentUser = email;
        document.getElementById('login').style.display = 'none';
        document.getElementById('chat').style.display = 'block';
        loadMessages();
      } catch (e) {
        alert('Error connecting to auth service');
      }
    }

    async function loadMessages() {
      try {
        const res = await fetch(MESSAGES_URL + '/messages');
        const messages = await res.json();
        messages.forEach(addMessage);
      } catch (e) {
        console.error('Could not load messages');
      }
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const message = input.value.trim();
      if (!message) return;
      socket.emit('sendMessage', { sender: currentUser, message });
      await fetch(MESSAGES_URL + '/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sender: currentUser, message }),
      });
      input.value = '';
    }

    socket.on('receiveMessage', (data) => {
      addMessage(data);
    });

    function addMessage(data) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.classList.add('message');
      if (data.sender !== currentUser) div.classList.add('other');
      div.innerHTML = `<div class="sender">${data.sender}</div>${data.message}`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
